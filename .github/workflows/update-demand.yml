      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install 'urllib3<2.0' pandas requests
          pip install git+https://github.com/GeneralMills/pytrends.git
      
      - name: Run demand patcher - Batch 7 (Products 300-349)
        run: python patch_demand.py --batch 7 --dashboard "index.html" --resume
        continue-on-error: false
      
      - name: Intermediate commit - Batch 7
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/demand_products.json data/progress_batch_*.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore: update demand data batch 7 - $(date +'%Y-%m-%d %H:%M UTC') [skip ci]"
          git pull --rebase origin main && git push || true
      
      - name: Wait between batches
        run: sleep 900  # 15 minute break
      
      - name: Run demand patcher - Batch 8 (Products 350-374)
        run: python patch_demand.py --batch 8 --dashboard "index.html" --resume
        continue-on-error: true
      
      - name: Final commit - Group 3
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/demand_products.json
          git add data/progress_batch_*.json 2>/dev/null || true
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          
          git commit -m "chore: update demand data (batches 7-8, COMPLETE) - $(date +'%Y-%m-%d %H:%M UTC') [skip ci]"
          
          for i in 1 2 3; do
            echo "Push attempt $i..."
            if git pull --rebase origin main && git push; then
              echo "Successfully pushed changes"
              exit 0
            fi
            echo "Push failed, retrying in 5 seconds..."
            sleep 5
          done
          
          echo "Failed to push after 3 attempts"
          exit 1
      
      - name: Upload workflow artifacts (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: demand-update-logs-group-3
          path: |
            data/progress_batch_*.json
            *.log
          retention-days: 7
