name: Update Demand Data
on:
  schedule:
    - cron: '0 2 * * 1'  # Every Monday at 2 AM UTC
  workflow_dispatch:
jobs:
  update-demand:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 480  # 8 hour timeout (increased for longer delays)
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install 'urllib3<2.0' pandas requests
          pip install git+https://github.com/GeneralMills/pytrends.git
      
      - name: Run all batches (1-11)
        run: |
          echo "Starting demand data update for 374 products (11 batches @ 35 products/batch)"
          
          for batch in {1..11}; do
            echo ""
            echo "=========================================="
            echo "Starting Batch $batch/11"
            echo "=========================================="
            
            python patch_demand.py --batch $batch --dashboard "index.html" --resume
            
            # Intermediate commit after each batch
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data/demand_products.json data/progress_batch_*.json 2>/dev/null || true
            
            if ! git diff --staged --quiet; then
              git commit -m "chore: update demand data batch $batch/11 - $(date +'%Y-%m-%d %H:%M UTC') [skip ci]"
              git pull --rebase origin main && git push || echo "Push failed, will retry at end"
            fi
            
            # Wait 20 minutes between batches (except after last batch)
            # Increased from 15 to 20 minutes for extra safety
            if [ $batch -lt 11 ]; then
              echo "Waiting 20 minutes before next batch..."
              sleep 1200
            fi
          done
          
          echo ""
          echo "=========================================="
          echo "All batches completed!"
          echo "=========================================="
      
      - name: Final commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/demand_products.json data/progress_batch_*.json 2>/dev/null || true
          
          if git diff --staged --quiet; then
            echo "No new changes to commit"
            exit 0
          fi
          
          git commit -m "chore: complete demand data update (all 11 batches) - $(date +'%Y-%m-%d %H:%M UTC') [skip ci]"
          
          # Retry push up to 3 times
          for i in 1 2 3; do
            echo "Push attempt $i..."
            if git pull --rebase origin main && git push; then
              echo "Successfully pushed all changes"
              exit 0
            fi
            echo "Push failed, retrying in 5 seconds..."
            sleep 5
          done
          
          echo "Failed to push after 3 attempts"
          exit 1
      
      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: demand-update-logs
          path: |
            data/progress_batch_*.json
            *.log
          retention-days: 7
