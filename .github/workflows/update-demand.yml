name: Update Demand Data

on:
  schedule:
    - cron: '0 2 * * 1'   # Every Monday at 2 AM UTC
  workflow_dispatch:        # Also allows manual trigger

jobs:
  update-demand:
    runs-on: ubuntu-latest

    permissions:
      contents: write       # Needed to commit demand.json back to repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pytrends --break-system-packages

      - name: Run demand patcher
        run: python patch_demand.py

      - name: Commit and push demand.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/demand.json
          git diff --staged --quiet || git commit -m "chore: update demand scores [skip ci]"
          git push
