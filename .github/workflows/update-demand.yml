          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/demand_products.json data/progress_batch_*.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore: update demand data batch 5 - $(date +'%Y-%m-%d %H:%M UTC') [skip ci]"
          git pull --rebase origin main && git push || true
      
      - name: Wait between batches
        run: sleep 900  # 15 minute break
      
      - name: Run demand patcher - Batch 6 (Products 250-299)
        run: python patch_demand.py --batch 6 --dashboard "index.html" --resume
        continue-on-error: true
      
      - name: Final commit - Group 2
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/demand_products.json
          git add data/progress_batch_*.json 2>/dev/null || true
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          
          git commit -m "chore: update demand data (batches 4-6) - $(date +'%Y-%m-%d %H:%M UTC') [skip ci]"
          
          for i in 1 2 3; do
            echo "Push attempt $i..."
            if git pull --rebase origin main && git push; then
              echo "Successfully pushed changes"
              exit 0
            fi
            echo "Push failed, retrying in 5 seconds..."
            sleep 5
          done
          
          echo "Failed to push after 3 attempts"
          exit 1
      
      - name: Upload workflow artifacts (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: demand-update-logs-group-2
          path: |
            data/progress_batch_*.json
            *.log
          retention-days: 7

  update-demand-group-3:
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '0 2 * * 5') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.batch_group == '3')
    runs-on: ubuntu-latest
    permissions:
