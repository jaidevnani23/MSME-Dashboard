name: Update Demand Data

on:
  schedule:
    - cron: '0 2 * * 1'
  workflow_dispatch:

jobs:
  update-demand:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # full history for rebase
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pytrends pandas requests --break-system-packages

      - name: Run demand patcher
        run: python patch_demand.py

      - name: Commit and push demand.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Stage the file
          git add data/demand.json
          
          # Check if there's anything to commit
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          
          git commit -m "chore: update demand scores [skip ci]"
          
          # Push with retry — handles race conditions gracefully
          for i in 1 2 3; do
            echo "Push attempt $i..."
            git pull --rebase origin main && git push && break
            echo "Push failed, retrying..."
            sleep 2
          done
