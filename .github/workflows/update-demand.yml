    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install 'urllib3<2.0' pandas requests
          pip install git+https://github.com/GeneralMills/pytrends.git
      
      - name: Run demand patcher - Batch 4 (Products 150-199)
        run: python patch_demand.py --batch 4 --dashboard "index.html" --resume
        continue-on-error: false
      
      - name: Intermediate commit - Batch 4
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/demand_products.json data/progress_batch_*.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore: update demand data batch 4 - $(date +'%Y-%m-%d %H:%M UTC') [skip ci]"
          git pull --rebase origin main && git push || true
      
      - name: Wait between batches
